<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">
<title>League Draft Board · 2026 World Cup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0a0a0c; --ink2:#141318; --ink3:#1b1a20; --line:#2a2a30; --chalk:#eef0f2;
  --muted:#8b8f98; --muted2:#5c606a; --gold:#e8b64c; --gold-soft:#f4d488; --gold-d:#7a5c1f;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:radial-gradient(1100px 720px at 50% 34%, #171207 0%, #0d0b09 50%, var(--ink) 86%);
  color:var(--chalk);font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;line-height:1.45;
}
.wrap{max-width:860px;margin:0 auto;padding:28px 20px 40px}

.eyebrow{font-family:"Barlow Condensed",sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.22em;font-size:12px;color:var(--muted)}
h1{font-family:"Barlow Condensed",sans-serif;font-weight:700;text-transform:uppercase;font-size:clamp(30px,5vw,50px);margin:4px 0 0;line-height:.95}

section{margin-top:34px}
.sec-h{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:0 0 14px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.sec-h .t{font-family:"Barlow Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.09em;font-size:20px;color:var(--chalk)}
.sec-h .n{font-family:"Barlow Condensed",sans-serif;text-transform:uppercase;letter-spacing:.1em;font-size:12px;color:var(--muted2)}

/* Draft order — condensed grid */
.draft{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.dchip{display:flex;align-items:center;gap:9px;background:var(--ink2);border:1px solid var(--line);border-radius:10px;padding:8px 10px}
.dchip.top{border-color:var(--gold-d);background:linear-gradient(90deg,rgba(232,182,76,.12),var(--ink2) 72%)}
.dpick{font-family:"Barlow Condensed",sans-serif;font-weight:700;font-size:24px;color:var(--muted2);width:24px;text-align:center;font-variant-numeric:tabular-nums;line-height:1}
.dchip.top .dpick{color:var(--gold)}
.dflag{font-size:21px;line-height:1}
.dbody{display:flex;flex-direction:column;min-width:0}
.dperson{font-family:"Barlow Condensed",sans-serif;font-weight:600;font-size:16px;line-height:1.06}
.dtag{font-family:"Barlow Condensed",sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted2);white-space:nowrap}
.dchip.top .dtag{color:var(--gold-soft)}
.dchip.pending{opacity:.45}
.dpend{font-size:11px;font-style:italic;color:var(--muted2)}

/* Bracket */
.bracket-wrap{max-width:640px;margin:0 auto}
svg{width:100%;height:auto;display:block}

/* Upcoming matches */
.day{font-family:"Barlow Condensed",sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.12em;font-size:13px;color:var(--muted);margin:18px 0 10px}
.day:first-child{margin-top:0}
.match{background:linear-gradient(180deg,var(--ink2),#0e0d11);border:1px solid var(--line);border-radius:14px;padding:13px 16px 15px;margin-bottom:12px}
.mtop{display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-size:12px;color:var(--muted2);margin-bottom:12px}
.round{font-family:"Barlow Condensed",sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.1em;font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--line);color:var(--muted)}
.round.r16{color:var(--gold-soft);border-color:var(--gold-d)}
.when{color:var(--chalk);font-weight:500}
.d{width:3px;height:3px;border-radius:50%;background:var(--muted2)}
.live{color:#e8705b;font-weight:600;font-family:"Barlow Condensed",sans-serif;letter-spacing:.1em;text-transform:uppercase}
.mrow{display:grid;grid-template-columns:1fr 1.3fr 1fr;align-items:center;gap:12px}
.side{display:flex;align-items:center;gap:11px;min-width:0}
.side.opp{justify-content:flex-end}
.flag{font-size:32px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
.s-txt{display:flex;flex-direction:column;min-width:0}
.s-txt.right{align-items:flex-end;text-align:right}
.country{font-family:"Barlow Condensed",sans-serif;font-weight:600;font-size:20px;line-height:1.02;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.person{font-family:"Barlow Condensed",sans-serif;font-weight:600;font-size:13px;letter-spacing:.1em;color:var(--gold);text-transform:uppercase;line-height:1.2}
.status,.olabel{font-family:"Barlow Condensed",sans-serif;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2)}
.oddswrap{display:flex;flex-direction:column;gap:5px}
.odds-labels{display:flex;justify-content:space-between;align-items:baseline}
.pl{font-family:"Barlow Condensed",sans-serif;font-weight:700;font-size:19px;color:var(--gold-soft);line-height:1}
.po{font-family:"Barlow Condensed",sans-serif;font-weight:700;font-size:19px;color:var(--muted);line-height:1}
.mid{font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted2)}
.bar{display:flex;height:7px;border-radius:4px;overflow:hidden;background:#26262c}
.fill-l{background:linear-gradient(90deg,var(--gold),var(--gold-soft))}
.fill-r{background:#3a3a42}

footer{margin-top:30px;text-align:center;color:var(--muted2);font-size:12px}

@media (max-width:560px){
  .mrow{grid-template-columns:1fr;gap:14px}
  .side.opp{justify-content:flex-start;flex-direction:row}
  .s-txt.right{align-items:flex-start;text-align:left}
  .oddswrap{order:3}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">2026 FIFA World Cup · Knockouts</div>
  <h1>League Draft Board</h1>

  <section>
    <div class="sec-h"><span class="t">Draft Order</span><span class="n">Champion 1st → first out 10th</span></div>
    <div class="draft" id="draft"></div>
  </section>

  <section>
    <div class="sec-h"><span class="t">Bracket</span><span class="n">COOL DUDE TEAMS IN GOLD</span></div>
    <div class="bracket-wrap"><div id="bracket"></div></div>
  </section>

  <section>
    <div class="sec-h"><span class="t">Upcoming Matches</span><span class="n">% to advance</span></div>
    <div id="schedule"></div>
  </section>

  <footer>Snapshot: July 1, 2026 · all times PT<br><span style="opacity:.55;font-size:11px">Trophy: “Coppa del mondo” by Gambo7 · Wikimedia Commons · CC BY-SA 4.0</span></footer>
</div>

<script>
/* ============================================================
   LEAGUE CODING RULES (elimination order)
   1. When two teams are knocked out in the SAME round, goal
      differential (GD) decides elimination order — the team with
      the worse (lower) GD is eliminated first (i.e. lands the worst
      draft pick).
   2. When GD is equal, the team that lost in the more embarrassing
      fashion is eliminated first.
      NOTE: "embarrassing" is subjective and is NOT computed here —
      resolve equal-GD ties by hand via the ELIM_TIEBREAK map below.
   ============================================================ */

/* ---------- teams + league ---------- */
const TEAM = {
  FRA:{f:'🇫🇷',n:'France'},      SWE:{f:'🇸🇪',n:'Sweden'},
  GER:{f:'🇩🇪',n:'Germany'},     PAR:{f:'🇵🇾',n:'Paraguay'},
  RSA:{f:'🇿🇦',n:'South Africa'},CAN:{f:'🇨🇦',n:'Canada'},
  NED:{f:'🇳🇱',n:'Netherlands'}, MAR:{f:'🇲🇦',n:'Morocco'},
  POR:{f:'🇵🇹',n:'Portugal'},    CRO:{f:'🇭🇷',n:'Croatia'},
  ESP:{f:'🇪🇸',n:'Spain'},       AUT:{f:'🇦🇹',n:'Austria'},
  USA:{f:'🇺🇸',n:'USA'},         BIH:{f:'🇧🇦',n:'Bosnia & Herz.'},
  BEL:{f:'🇧🇪',n:'Belgium'},     SEN:{f:'🇸🇳',n:'Senegal'},
  BRA:{f:'🇧🇷',n:'Brazil'},      JPN:{f:'🇯🇵',n:'Japan'},
  CIV:{f:'🇨🇮',n:'Côte d’Ivoire'},NOR:{f:'🇳🇴',n:'Norway'},
  MEX:{f:'🇲🇽',n:'Mexico'},      ECU:{f:'🇪🇨',n:'Ecuador'},
  ENG:{f:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',n:'England'},   COD:{f:'🇨🇩',n:'DR Congo'},
  SUI:{f:'🇨🇭',n:'Switzerland'}, ALG:{f:'🇩🇿',n:'Algeria'},
  ARG:{f:'🇦🇷',n:'Argentina'},   CPV:{f:'🇨🇻',n:'Cape Verde'},
  AUS:{f:'🇦🇺',n:'Australia'},   EGY:{f:'🇪🇬',n:'Egypt'},
  COL:{f:'🇨🇴',n:'Colombia'},    GHA:{f:'🇬🇭',n:'Ghana'},
};
const PERSON = {FRA:'Adam',ESP:'Cory',ARG:'Alex',ENG:'Chris',POR:'Daniel',
                BRA:'Jordan',NED:'David',MAR:'Jason',BEL:'Gordy',GER:'Scott'};

/* ---------- bracket data ---------- */
const ORDER = [
  'FRA','SWE','GER','PAR','RSA','CAN','NED','MAR',
  'POR','CRO','ESP','AUT','USA','BIH','BEL','SEN',
  'BRA','JPN','CIV','NOR','MEX','ECU','ENG','COD',
  'SUI','ALG','ARG','CPV','AUS','EGY','COL','GHA'
];
const RESULTS = {
  r32:['FRA','PAR','CAN','MAR', null,null,null,null,
       'BRA','NOR','MEX','ENG', null,null,null,null],
  r16:[null,null,null,null,null,null,null,null],
  qf :[null,null,null,null],
  sf :[null,null],
  champ:[null],
  elimOrder:[]   // computed at runtime from the bracket + GD (see Coding Rules)
};

/* Goal differential per team — fill in real numbers as results come in.
   Only eliminated teams matter for ordering; missing = 0. (Coding Rule #1) */
const GD = { GER:-3, NED:-1 };

/* Manual tiebreak for EQUAL goal differential (Coding Rule #2, the subjective
   "more embarrassing loss"). Lower number = eliminated first. Empty = none. */
const ELIM_TIEBREAK = { /* e.g.  GER: 1, NED: 2  */ };

/* ---------- upcoming matches (p = league team % to advance) ---------- */
const MATCHES = [
  {round:'R32',day:'Wednesday · July 1',time:'1:00 PM PT',venue:'Lumen Field · Seattle',tv:'FS1',live:true,L:'BEL',person:'Gordy',O:'SEN',p:60},
  {round:'R32',day:'Thursday · July 2',time:'12:00 PM PT',venue:'SoFi Stadium · Los Angeles',tv:'FOX',L:'ESP',person:'Cory',O:'AUT',p:87},
  {round:'R32',day:'Thursday · July 2',time:'4:00 PM PT',venue:'BMO Field · Toronto',tv:'FOX',L:'POR',person:'Daniel',O:'CRO',p:70},
  {round:'R32',day:'Friday · July 3',time:'3:00 PM PT',venue:'Hard Rock Stadium · Miami',tv:'FOX',L:'ARG',person:'Alex',O:'CPV',p:93},
  {round:'R16',day:'Saturday · July 4',time:'10:00 AM PT',venue:'NRG Stadium · Houston',tv:'FOX',L:'MAR',person:'Jason',O:'CAN',p:76},
  {round:'R16',day:'Saturday · July 4',time:'2:00 PM PT',venue:'Lincoln Financial Field · Philadelphia',tv:'FOX',L:'FRA',person:'Adam',O:'PAR',p:84},
  {round:'R16',day:'Sunday · July 5',time:'1:00 PM PT',venue:'MetLife Stadium · New Jersey',tv:'FOX',L:'BRA',person:'Jordan',O:'NOR',p:72},
  {round:'R16',day:'Sunday · July 5',time:'5:00 PM PT',venue:'Estadio Azteca · Mexico City',tv:'FOX',L:'ENG',person:'Chris',O:'MEX',p:57},
];

/* ============================================================
   BRACKET GEOMETRY
   ============================================================ */
const CX=490, CY=490;
const R  = [380,300,222,145,74,0];
const NR = [28,22,18,14,12,0];
const WIN = [RESULTS.r32, RESULTS.r16, RESULTS.qf, RESULTS.sf, RESULTS.champ];

const levelCodes=[ORDER.slice()];
for(let L=1;L<=5;L++) levelCodes[L]=WIN[L-1].slice();
const levelAngles=[ORDER.map((_,i)=> -90 + i*11.25)];
for(let L=1;L<=4;L++){
  const prev=levelAngles[L-1], arr=[];
  for(let k=0;k<prev.length/2;k++) arr.push((prev[2*k]+prev[2*k+1])/2);
  levelAngles[L]=arr;
}
function pos(radius,deg){const a=deg*Math.PI/180;return{x:CX+radius*Math.cos(a),y:CY+radius*Math.sin(a)};}
function polar(radius,deg){const p=pos(radius,deg);return[p.x,p.y];}
function advanced(L,k){ const w=WIN[L][k>>1], code=levelCodes[L][k]; return code && w===code; }
function decided(L,k){ return WIN[L][k>>1]!=null; }
function nodeOpacity(L,k){ if(!decided(L,k)) return 1; return advanced(L,k)?1:0.36; }
function deepestNode(code){for(let L=5;L>=0;L--){const idx=levelCodes[L].indexOf(code);if(idx>=0)return{L,k:idx};}return null;}
function isEliminated(code){const dn=deepestNode(code);if(!dn||dn.L===5)return false;return decided(dn.L,dn.k)&&!advanced(dn.L,dn.k);}
function redX(x,y,r){const d=r*0.7;return `<g><circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${(r+1).toFixed(1)}" fill="rgba(12,0,0,0.5)"/><line x1="${(x-d).toFixed(1)}" y1="${(y-d).toFixed(1)}" x2="${(x+d).toFixed(1)}" y2="${(y+d).toFixed(1)}" stroke="#ff3b30" stroke-width="3.6" stroke-linecap="round"/><line x1="${(x-d).toFixed(1)}" y1="${(y+d).toFixed(1)}" x2="${(x+d).toFixed(1)}" y2="${(y-d).toFixed(1)}" stroke="#ff3b30" stroke-width="3.6" stroke-linecap="round"/></g>`;}

function svgChip(x,y,r,code,opacity){
  const t=TEAM[code]; const ring = PERSON[code] ? 'var(--gold)' : 'rgba(255,255,255,.16)';
  const rw = PERSON[code] ? 2 : 1;
  return `<g opacity="${opacity}">
    <circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r}" fill="#14141a" stroke="${ring}" stroke-width="${rw}"/>
    <text x="${x.toFixed(1)}" y="${(y+0.5).toFixed(1)}" font-size="${(r*1.42).toFixed(1)}" text-anchor="middle" dominant-baseline="central">${t.f}</text>
  </g>`;
}

function buildSVG(){
  const defs = `<defs><radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffd77a" stop-opacity="0.55"/>
    <stop offset="30%" stop-color="#e8a83c" stop-opacity="0.28"/>
    <stop offset="60%" stop-color="#8a5a12" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient></defs>`;
  const glow = `<circle cx="${CX}" cy="${CY}" r="200" fill="url(#glow)"/>`;

  const litS='#f4f4f6', dimS='#2b2b31', neuS='#3a3a42';
  function seg(d,kind){const s=kind==='lit'?litS:kind==='dim'?dimS:neuS;const w=kind==='lit'?2.4:kind==='dim'?1.2:1.4;const o=kind==='lit'?1:kind==='dim'?.7:.85;return `<path d="${d}" fill="none" stroke="${s}" stroke-width="${w}" opacity="${o}" stroke-linecap="round"/>`;}
  function radialSeg(r1,d1,r2,d2){const [x1,y1]=polar(r1,d1),[x2,y2]=polar(r2,d2);return `M${x1.toFixed(1)},${y1.toFixed(1)} L${x2.toFixed(1)},${y2.toFixed(1)}`;}
  function arcSeg(rad,fromDeg,toDeg){const [x1,y1]=polar(rad,fromDeg),[x2,y2]=polar(rad,toDeg);const sweep=toDeg>fromDeg?1:0;const large=Math.abs(toDeg-fromDeg)>180?1:0;return `M${x1.toFixed(1)},${y1.toFixed(1)} A${rad},${rad} 0 ${large} ${sweep} ${x2.toFixed(1)},${y2.toFixed(1)}`;}

  let conns='';
  for(let L=0;L<=4;L++){
    const nParents=levelCodes[L].length/2;
    for(let m=0;m<nParents;m++){
      const c1=2*m,c2=2*m+1, a1=levelAngles[L][c1], a2=levelAngles[L][c2];
      const dec=WIN[L][m]!=null;
      const k1=!dec?'neu':(advanced(L,c1)?'lit':'dim');
      const k2=!dec?'neu':(advanced(L,c2)?'lit':'dim');
      if(L===4){
        const [x1,y1]=polar(R[L],a1),[x2,y2]=polar(R[L],a2);
        conns+=seg(`M${x1.toFixed(1)},${y1.toFixed(1)} L${CX},${CY}`,k1);
        conns+=seg(`M${x2.toFixed(1)},${y2.toFixed(1)} L${CX},${CY}`,k2);
        continue;
      }
      const ap=levelAngles[L+1][m], rp=R[L+1];
      conns+=seg(radialSeg(R[L],a1,rp,a1),k1);
      conns+=seg(radialSeg(R[L],a2,rp,a2),k2);
      conns+=seg(arcSeg(rp,a1,ap),k1);
      conns+=seg(arcSeg(rp,ap,a2),k2);
    }
  }

  let dots='';
  for(let L=1;L<=4;L++) for(let k=0;k<levelCodes[L].length;k++)
    if(levelCodes[L][k]==null){const q=pos(R[L],levelAngles[L][k]);dots+=`<circle cx="${q.x.toFixed(1)}" cy="${q.y.toFixed(1)}" r="4" fill="#3a3a42"/>`;}

  let chips='';
  for(let L=0;L<=4;L++) for(let k=0;k<levelCodes[L].length;k++){
    const code=levelCodes[L][k]; if(code==null) continue;
    const q=pos(R[L],levelAngles[L][k]); chips+=svgChip(q.x,q.y,NR[L],code,nodeOpacity(L,k));
  }

  let xmarks='';
  for(const code in PERSON){ if(!isEliminated(code)) continue; const dn=deepestNode(code); const q=pos(R[dn.L],levelAngles[dn.L][dn.k]); xmarks+=redX(q.x,q.y,NR[dn.L]); }

  let names='';
  for(let i=0;i<ORDER.length;i++){
    const code=ORDER[i]; if(!PERSON[code]) continue;
    const [lx,ly]=polar(R[0]+36, levelAngles[0][i]);
    const dim = decided(0,i)&&!advanced(0,i)?0.5:1;
    names+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" font-family="Barlow Condensed" font-size="18" font-weight="700" letter-spacing="0.05em" text-anchor="middle" dominant-baseline="central" fill="#f4d488" opacity="${dim}">${PERSON[code].toUpperCase()}</text>`;
  }

  const champ=RESULTS.champ[0];
  // Actual World Cup trophy graphic (trophy.svg, CC BY-SA — credited in footer)
  const TW=110.59019, TH=294.96652;
  const trophyImg=(h,cy)=>{const w=h*TW/TH;return `<image href="trophy.svg" x="${(CX-w/2).toFixed(1)}" y="${(cy-h/2).toFixed(1)}" width="${w.toFixed(1)}" height="${h}" preserveAspectRatio="xMidYMid meet"/>`;};
  let center=trophyImg(104,CY);
  if(champ){
    center=trophyImg(66,CY-28)
      + svgChip(CX,CY+30,22,champ,1)
      + (PERSON[champ]?`<text x="${CX}" y="${CY+62}" font-family="Barlow Condensed" font-size="15" font-weight="700" letter-spacing="0.08em" text-anchor="middle" fill="#f4d488">${PERSON[champ].toUpperCase()}</text>`:'');
  }

  return `<svg viewBox="0 0 980 980" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="2026 World Cup radial bracket">
    ${defs}${glow}<g>${conns}</g><g>${dots}</g><g>${chips}</g><g>${xmarks}</g><g>${names}</g>${center}</svg>`;
}

/* ============================================================
   DRAFT ORDER (champion first)
   ============================================================ */
const ROUND_SHORT=['R32','R16','QF','SF','Final','🏆'];
function winCount(code){let n=0;for(let L=1;L<=5;L++)if(levelCodes[L].includes(code))n++;return n;}
/* Elimination order per Coding Rules: eliminated-earliest first, then within
   the same round worst GD first, then the manual embarrassment tiebreak.
   Rule #2's "embarrassing" judgment comes from ELIM_TIEBREAK, not computation. */
function computeElimOrder(){
  const gd=c=>GD[c]??0, tb=c=>ELIM_TIEBREAK[c]??0;
  return Object.keys(PERSON).filter(isEliminated)
    .sort((a,b)=> winCount(a)-winCount(b) || gd(a)-gd(b) || tb(a)-tb(b));
}
function draftRows(){
  const assigned=Object.keys(PERSON);
  const out=RESULTS.elimOrder.filter(c=>assigned.includes(c));
  const champ=(RESULTS.champ[0]&&assigned.includes(RESULTS.champ[0]))?RESULTS.champ[0]:null;
  const alive=assigned.filter(c=>!out.includes(c)&&c!==champ);
  const bottom=champ?champ:(alive.length===1?alive[0]:null);
  const pending=10-out.length-(bottom?1:0);
  const wtb=[];
  out.forEach(c=>wtb.push({code:c,kind:'out'}));
  for(let i=0;i<pending;i++) wtb.push({kind:'pending'});
  if(bottom) wtb.push({code:bottom,kind:champ?'champion':'survivor'});
  return wtb.slice().reverse().map((s,i)=>({pick:i+1,...s}));
}
function buildDraft(){
  return draftRows().map(row=>{
    const n=String(row.pick).padStart(2,'0');
    if(row.kind==='pending')
      return `<div class="dchip pending"><span class="dpick">${n}</span><span class="dbody"><span class="dpend">Still in</span></span></div>`;
    const t=TEAM[row.code];
    let tag;
    if(row.kind==='champion') tag='🏆 Champion';
    else if(row.kind==='survivor') tag='Still in';
    else {const w=winCount(row.code); tag=w===4?'Runner-up':'Out · '+ROUND_SHORT[w];}
    const cls=row.pick===1?'dchip top':'dchip';
    return `<div class="${cls}"><span class="dpick">${n}</span><span class="dflag">${t.f}</span><span class="dbody"><span class="dperson">${PERSON[row.code]}</span><span class="dtag">${tag}</span></span></div>`;
  }).join('');
}

/* ============================================================
   UPCOMING MATCHES
   ============================================================ */
const ROUND_FULL={R32:'Round of 32',R16:'Round of 16'};
function statusWord(p){if(p>=70)return'Favored';if(p>=53)return'Slight edge';if(p>=47)return'Coin flip';if(p>=30)return'Underdog';return'Long shot';}
function matchCard(m){
  const L=TEAM[m.L],O=TEAM[m.O],po=100-m.p;
  const rcls=m.round==='R16'?'round r16':'round';
  const live=m.live?`<span class="d"></span><span class="live">Today</span>`:'';
  return `<div class="match">
    <div class="mtop"><span class="${rcls}">${ROUND_FULL[m.round]}</span><span class="when">${m.time}</span><span class="d"></span><span>${m.venue}</span><span class="d"></span><span>${m.tv}</span>${live}</div>
    <div class="mrow">
      <div class="side league"><span class="flag">${L.f}</span><span class="s-txt"><span class="country">${L.n}</span><span class="person">${m.person}</span><span class="status">${statusWord(m.p)}</span></span></div>
      <div class="oddswrap"><div class="odds-labels"><span class="pl">${m.p}%</span><span class="mid">to advance</span><span class="po">${po}%</span></div><div class="bar"><span class="fill-l" style="width:${m.p}%"></span><span class="fill-r" style="width:${po}%"></span></div></div>
      <div class="side opp"><span class="s-txt right"><span class="country">${O.n}</span><span class="olabel">Opponent</span></span><span class="flag">${O.f}</span></div>
    </div></div>`;
}
function buildSchedule(){
  let html='',day=null;
  for(const m of MATCHES){ if(m.day!==day){html+=`<div class="day">${m.day}</div>`;day=m.day;} html+=matchCard(m); }
  return html;
}

RESULTS.elimOrder = computeElimOrder();   // apply Coding Rules before drawing
document.getElementById('draft').innerHTML = buildDraft();
document.getElementById('bracket').innerHTML = buildSVG();
document.getElementById('schedule').innerHTML = buildSchedule();
